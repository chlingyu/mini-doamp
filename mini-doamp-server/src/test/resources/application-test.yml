# 测试专用 profile
# 数据源由 BaseIntegrationTest 的 Testcontainers MySQL 通过 @DynamicPropertySource 注入
# Redis/RabbitMQ 使用假连接参数，TestInfraConfig 提供 Mock 替代关键 Bean

spring:
  redis:
    host: localhost
    port: 16379
  rabbitmq:
    host: localhost
    port: 15672
    listener:
      simple:
        auto-startup: false

spring.main:
  allow-bean-definition-overriding: true

jwt:
  secret: testSecretKey12345678901234567890123
  expiration: 86400000
  refresh-expiration: 604800000

server:
  port: 0

xxl:
  job:
    enabled: false
    admin:
      addresses: http://localhost:18080/xxl-job-admin
    executor:
      port: -1
