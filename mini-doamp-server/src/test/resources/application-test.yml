# 测试专用 profile：使用 H2 内嵌数据库
# Redis/RabbitMQ 使用假连接参数，TestInfraConfig 提供 Mock 替代关键 Bean

spring:
  datasource:
    url: jdbc:h2:mem:mini_doamp_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema-h2.sql
      data-locations: classpath:sql/data.sql
      encoding: UTF-8
  redis:
    host: localhost
    port: 16379
  rabbitmq:
    host: localhost
    port: 15672
    listener:
      simple:
        auto-startup: false

spring.main:
  allow-bean-definition-overriding: true

jwt:
  secret: testSecretKey12345678901234567890123
  expiration: 86400000
  refresh-expiration: 604800000

server:
  port: 0

xxl:
  job:
    enabled: false
    admin:
      addresses: http://localhost:18080/xxl-job-admin
    executor:
      port: -1
