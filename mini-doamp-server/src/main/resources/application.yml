server:
  port: 9999

spring:
  application:
    name: mini-doamp
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mini_doamp?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    database: 0
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USERNAME:guest}
    password: ${RABBIT_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

security:
  permission:
    defaults:
      - dashboard.view
    role-mappings:
      ADMIN:
        - dashboard.view
        - warn.index
        - warn.rule
        - warn.record
        - warn.message
        - sop.workflow
        - sop.template
        - sop.task
        - sop.approve
        - system.dict
        - system.job
        - system.user
      OPERATOR:
        - dashboard.view
        - warn.index
        - warn.rule
        - warn.record
        - warn.message
        - sop.task
        - system.dict
        - system.job
      AUDITOR:
        - dashboard.view
        - warn.record
        - warn.message
        - sop.workflow
        - sop.approve
        - sop.task

xxl:
  job:
    admin:
      addresses: http://localhost:8080/xxl-job-admin
    executor:
      appname: mini-doamp-executor
      port: 9998
      logpath: /data/applogs/xxl-job/jobhandler
      logretentiondays: 30
    accessToken: ${XXL_JOB_ACCESS_TOKEN:default_token}

logging:
  config: classpath:log4j2.xml
