server:
  port: 9999

spring:
  application:
    name: mini-doamp
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mini_doamp?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 老库已有 schema 时首次切 Flyway 不会因表已存在而失败；新库从 V1 开始执行不受影响
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
  redis:
    host: localhost
    port: 6379
    database: 0
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USERNAME:guest}
    password: ${RABBIT_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

security:
  permission:
    defaults:
      - dashboard.view
    role-mappings:
      ADMIN:
        - dashboard.view
        - warn.index
        - warn.rule
        - warn.record
        - warn.message
        - sop.workflow
        - sop.template
        - sop.task
        - sop.approve
        - system.dict
        - system.job
        - system.user
      OPERATOR:
        - dashboard.view
        - warn.index
        - warn.rule
        - warn.record
        - warn.message
        - sop.task
        - system.dict
        - system.job
      AUDITOR:
        - dashboard.view
        - warn.record
        - warn.message
        - sop.workflow
        - sop.approve
        - sop.task

xxl:
  job:
    admin:
      addresses: http://localhost:8080/xxl-job-admin
    executor:
      appname: mini-doamp-executor
      port: 9998
      logpath: /data/applogs/xxl-job/jobhandler
      logretentiondays: 30
    accessToken: ${XXL_JOB_ACCESS_TOKEN:default_token}

logging:
  config: classpath:log4j2.xml

# --- P0-a/b: Observability ---
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        # health/info 默认开；prometheus/metrics/loggers/env/mappings 生产按需收口
        include: health,info,prometheus,metrics,loggers,env,mappings,beans,configprops
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    prometheus:
      access: read_only
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.75,0.9,0.95,0.99
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      # 本地开发全量采样；生产建议降到 0.1
      probability: ${TRACING_SAMPLING:1.0}
    propagation:
      type: w3c,b3
  observations:
    key-values:
      application: ${spring.application.name}

# --- P0-d: SpringDoc OpenAPI ---
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    display-request-duration: true
    groups-order: asc
    operations-sorter: alpha
    tags-sorter: alpha
  packages-to-scan: com.demo.minidoamp
  show-actuator: false
