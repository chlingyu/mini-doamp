name: CI

on:
  push:
    branches:
      - master
      - "upgrade/**"
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Gradle test (JDK 21, Testcontainers MySQL)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TESTCONTAINERS_REUSE_ENABLE: "false"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # GitHub Actions runners ship with Docker; Testcontainers only needs the daemon.
      - name: Verify Docker
        run: docker version

      # Windows-authored commits may strip the Linux exec bit. Defensive: make sure
      # gradlew is executable even if `git update-index --chmod=+x` was missed.
      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Compile
        run: ./gradlew --no-daemon compileJava compileTestJava

      - name: Test
        run: ./gradlew --no-daemon test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: ignore

  build-image:
    name: Build & push image to GHCR
    needs: test
    # Disabled until GHCR package permissions are set up on the repo (Settings →
    # Actions → General → Workflow permissions = "Read and write", plus the
    # package being owned by the user). Re-enable by removing the `if: false`.
    # Tracking issue: P1 — secrets/container-registry pipeline.
    if: false
    # Only push images from master commits (not PRs from forks)
    # if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mini-doamp
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
