apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mini-doamp.fullname" . }}
  labels:
    {{- include "mini-doamp.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "mini-doamp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mini-doamp.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "mini-doamp.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "mini-doamp.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.config.springProfiles | quote }}
            - name: TRACING_SAMPLING
              value: {{ .Values.config.tracingSamplingProbability | quote }}
            - name: DB_URL
              value: {{ printf "jdbc:mysql://%s:%d/%s?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=%s&allowPublicKeyRetrieval=true" .Values.database.host (int .Values.database.port) .Values.database.name (ternary "REQUIRED" "DISABLED" (eq .Values.database.sslMode "REQUIRED")) | quote }}
            - name: DB_USERNAME
              value: {{ .Values.database.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretRef.name }}
                  key: DB_PASSWORD
                  optional: {{ .Values.secretRef.optional }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretRef.name }}
                  key: JWT_SECRET
                  optional: {{ .Values.secretRef.optional }}
            - name: RABBIT_HOST
              value: {{ .Values.rabbitmq.host | quote }}
            - name: RABBIT_PORT
              value: {{ .Values.rabbitmq.port | quote }}
            - name: RABBIT_USERNAME
              value: {{ .Values.rabbitmq.user | quote }}
            - name: RABBIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretRef.name }}
                  key: RABBIT_PASSWORD
                  optional: true
            - name: SPRING_REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: SPRING_REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            {{- if .Values.config.xxlJob.enabled }}
            - name: XXL_JOB_ADMIN_ADDRESSES
              value: {{ .Values.config.xxlJob.adminAddress | quote }}
            - name: XXL_JOB_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretRef.name }}
                  key: XXL_JOB_ACCESS_TOKEN
                  optional: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: config
          configMap:
            name: {{ include "mini-doamp.fullname" . }}-config
        - name: logs
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
